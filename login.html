<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Login | OZSMS</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Login Section -->

<section class="login-section">

<div class="login-box">

<img src="images/school-logo.png"
alt="School Logo"
class="login-logo">

<h2>Student Portal Login</h2>

<p>
Osama Zafhar Shaheed Model School For Boys
</p>

<form>

<!-- Student ID -->

<input
type="text"
placeholder="Enter Student ID"
required>

<!-- Password -->

<input
type="password"
placeholder="Enter Password"
required>

<!-- Login Button -->

<button type="submit">

Login

</button>

</form>

<div class="login-links">

<a href="#">
Forgot Password?
</a>

<a href="#">
Need Help?
</a>

</div>

</div>

</section>

<script src="script.js"></script>

</body>

</html>
